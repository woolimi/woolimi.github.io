<h2 id="인덱싱과-슬라이싱"><a class="heading-link" aria-hidden="true" href="#인덱싱과-슬라이싱">인덱싱과 슬라이싱</a></h2>
<figure data-rehype-pretty-code-figure=""><pre style="background-color:#1F2028;color:#c8d3f5" tabindex="0" data-language="python" data-theme="moonlight-ii"><code data-language="python" data-theme="moonlight-ii" style="display: grid;"><span data-line=""><span style="color:#C8D3F5">s </span><span style="color:#86E1FC">=</span><span style="color:#86E1FC"> "</span><span style="color:#C3E88D">Hello World</span><span style="color:#86E1FC">"</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#858AA6"># 인덱싱</span></span>
<span data-line=""><span style="color:#C8D3F5">s</span><span style="color:#86E1FC">[</span><span style="color:#FF966C">0</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">      # 'H'</span></span>
<span data-line=""><span style="color:#C8D3F5">s</span><span style="color:#86E1FC">[-</span><span style="color:#FF966C">1</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">     # 'd' (마지막)</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#858AA6"># 슬라이싱 [start:end:step]</span></span>
<span data-line=""><span style="color:#C8D3F5">s</span><span style="color:#86E1FC">[</span><span style="color:#FF966C">0</span><span style="color:#86E1FC">:</span><span style="color:#FF966C">5</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">    # 'Hello'</span></span>
<span data-line=""><span style="color:#C8D3F5">s</span><span style="color:#86E1FC">[</span><span style="color:#FF966C">6</span><span style="color:#86E1FC">:]</span><span style="color:#858AA6">     # 'World'</span></span>
<span data-line=""><span style="color:#C8D3F5">s</span><span style="color:#86E1FC">[:</span><span style="color:#FF966C">5</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">     # 'Hello'</span></span>
<span data-line=""><span style="color:#C8D3F5">s</span><span style="color:#86E1FC">[::</span><span style="color:#FF966C">2</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">    # 'HloWrd' (2칸씩)</span></span>
