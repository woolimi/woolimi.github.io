<span data-line=""><span style="color:#C8D3F5">math</span><span style="color:#86E1FC">.</span><span style="color:#C8D3F5">isnan</span><span style="color:#86E1FC">(</span><span style="color:#C8D3F5">x</span><span style="color:#86E1FC">)</span><span style="color:#858AA6">         # NaN 체크</span></span>
