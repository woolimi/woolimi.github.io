<span data-line=""><span style="color:#C8D3F5">lst</span><span style="color:#86E1FC">[-</span><span style="color:#FF966C">2</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">       # 4 (뒤에서 두 번째)</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#858AA6"># 슬라이싱 [start:end:step]</span></span>
<span data-line=""><span style="color:#C8D3F5">lst</span><span style="color:#86E1FC">[</span><span style="color:#FF966C">1</span><span style="color:#86E1FC">:</span><span style="color:#FF966C">4</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">      # [1, 2, 3]</span></span>

<span data-line=""><span style="color:#C8D3F5">lst</span><span style="color:#86E1FC">[</span><span style="color:#FF966C">3</span><span style="color:#86E1FC">:]</span><span style="color:#858AA6">       # [3, 4, 5]</span></span>

<span data-line=""><span style="color:#C8D3F5">lst</span><span style="color:#86E1FC">[</span><span style="color:#FF966C">1</span><span style="color:#86E1FC">:</span><span style="color:#FF966C">5</span><span style="color:#86E1FC">:</span><span style="color:#FF966C">2</span><span style="color:#86E1FC">]</span><span style="color:#858AA6">    # [1, 3]</span></span>
<span data-line=""> </span>
