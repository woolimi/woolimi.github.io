\\n\",\"    for i in range(len(list)):\\n\",\"        for j in range(len(list) - 1):\\n\",\"            if list[j] \u003e list[j + 1]:\\n\",\"                list[j], list[j + 1] = list[j + 1], list[j]\\n\",\"    return list\\n\",\"\\n\",\"bubble_sort(list)\"],\"outputs\":[{\"data\":{\"text/plain\":[\"[2, 4, 5, 6, 7]\"]},\"execution_count\":2,\"metadata\":{},\"output_type\":\"execute_result\"}],\"execution_count\":2,\"metadata\":{}},{\"cell_type\":\"markdown\",\"source\":[\"## 선택정렬 O(n^2)\\n\",\"\\n\",\"최소값을 찾아서 맨 앞에서 부터 채워넣는 방식\"],\"outputs\":[],\"execution_count\":null,\"metadata\":{}},{\"cell_type\":\"code\",\"source\":[\"list = [4, 5, 2, 6, 7]\\n\",\"\\n\",\"# 1. [a, b, c ... f] 에서 최소값을 찾는다.\\n\",\"# 2. 찾은 최소값을 맨 앞에 값(a)과 교체\\n\",\"# 3.     [b, c, .. f] 에서 최소값을 찾는다.\\n\",\"# 4. 찾은 최소값을 맨 앞의 값(b)과 교체\\n\",\"# ... 반복\\n\",\"\\n\",\"def selection_sort(list):\\n\",\"    for i in range(len(list)):\\n\",\"        min_index = i\\n\",\"        for j in range(i + 1, len(list)):\\n\",\"            if list[j] \u003c list[min_index]:\\n\",\"                min_index = j\\n\",\"        list[i], list[min_index] = list[min_index], list[i]\\n\",\"    return list\\n\",\"\\n\",\"selection_sort(list)\"],\"outputs\":[{\"data\":{\"text/plain\":[\"[2, 4, 5, 6, 7]\"]},\"execution_count\":1,\"metadata\":{},\"output_type\":\"execute_result\"}],\"execution_count\":1,\"metadata\":{}},{\"cell_type\":\"markdown\",\"source\":[\"## 삽입정렬 O(n^2)\\n\",\"\\n\",\"전체에서 하나씩 올바른 위치에 삽입하는 방식\"],\"outputs\":[],\"execution_count\":null,\"metadata\":{}},{\"cell_type\":\"code\",\"source\":[\"list = [4, 5, 2, 6, 7]\\n\",\"\\n\",\"# 1. [a, b, c, d, e], 맨 앞에 있는 것은 이미 정렬이 되어있다고 가정\\n\",\"# 2. [a] 에 b 를 넣는다고 생각\\n\",\"# 3. [a, b]\\n\",\"# 4. [a, b] 에 c 를 넣는다고 생각\\n\",\"# 5. [a, c, b]\\n\",\"# 6. 반복...\\n\",\"\\n\",\"def insertion_sort(list):\\n\",\"    for i in range(1, len(list)):\\n\",\"        for j in range(i, 0, -1):\\n\",\"            if list[j] \u003c list[j - 1]:\\n\",\"                list[j], list[j - 1] = list[j - 1], list[j]\\n\",\"    return list\\n\",\"\\n\",\"insertion_sort(list)\"],\"outputs\":[{\"data\":{\"text/plain\":[\"[2, 4, 5, 6, 7]\"]},\"execution_count\":2,\"metadata\":{},\"output_type\":\"execute_result\"}],\"execution_count\":2,\"metadata\":{}},{\"cell_type\":\"markdown\",\"source\":[\"## 병합정렬 O(N * logN)\\n\",\"\\n\",\"배열의 앞부분과 뒷부분의 두 그룹으로 나누어 각각 정렬한 후 병합하는 작업을 반복하는 알고리즘.\"],\"outputs\":[],\"execution_count\":null,\"metadata\":{}},{\"cell_type\":\"code\",\"source\":[\"list = [4, 5, 2, 6, 7]\\n\",\"\\n\",\"# 배열을 반으로 나누기 때문에 시간복잡도 O(logN) * 배열을 합치는 함수 O(N) = O(N * logN)\\n\",\"def merge_sort(list):\\n\",\"    if len(list) \u003c= 1:\\n\",\"        return list\\n\",\"    \\n\",\"    midIndex = len(list) // 2\\n\",\"    left = merge_sort(list[:midIndex])\\n\",\"    right = merge_sort(list[midIndex:])\\n\",\"\\n\",\"    return merge(merge_sort(left), merge_sort(right))\\n\",\"\\n\",\"# 정렬된 배열 2개를 합치는 함수, 시간복잡도 O(N)\\n\",\"def merge(left, right):\\n\",\"    result = []\\n\",\"    left_idx = 0\\n\",\"    right_idx = 0\\n\",\"    while left_idx \u003c len(left) and right_idx \u003c len(right):\\n\",\"        if left[left_idx] \u003c right[right_idx]:\\n\",\"            result.append(left[left_idx])\\n\",\"            left_idx += 1\\n\",\"        else:\\n\",\"            result.append(right[right_idx])\\n\",\"            right_idx += 1\\n\",\"\\n\",\"    while left_idx \u003c len(left):\\n\",\"        result.append(left[left_idx])\\n\",\"        left_idx += 1\\n\",\"\\n\",\"    while right_idx \u003c len(right):\\n\",\"        result.append(right[right_idx])\\n\",\"        right_idx += 1\\n\",\"\\n\",\"    return result\\n\",\"\\n\",\"merge_sort(list)\"],\"outputs\":[{\"data\":{\"text/plain\":[\"[2, 4, 5, 6, 7]\"]},\"execution_count\":3,\"metadata\":{},\"output_type\":\"execute_result\"}],\"execution_count\":null,\"metadata\":{}}],\"metadata\":{\"kernelspec\":{\"display_name\":\".venv\",\"language\":\"python\",\"name\":\"python3\"},\"language_info\":{\"
