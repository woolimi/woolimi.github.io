/_next/static/chunks/05delksreef4f.js\",\"/_next/static/chunks/314de4rhotqzp.js\",\"/_next/static/chunks/0heh8229j57ve.js\"],\"BlogArticleCard\"]\n19:T32c3,"])</script><script>self.__next_f.push([1,"\u003ch2 id=\"기구학-kinematics\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#기구학-kinematics\"\u003e기구학 (Kinematics)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003emanipulators\u003c/strong\u003e: 인간의 팔과 유사하게 관절과 링크로 연결되어 물체를 잡거나 이동시키는 기계적 장치(로봇 팔)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eend-effector (끝단 장치)\u003c/strong\u003e: 로봇 팔의 맨 끝에 달리는 툴. 그리퍼, 용접 토치, 드릴 등 작업 목적에 따라 교체\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDOF — Degrees of Freedom (자유도)\u003c/strong\u003e: 로봇이 독립적으로 움직일 수 있는 방향의 수. 6-DOF 팔은 3차원 공간에서 위치(x,y,z)와 방향(roll,pitch,yaw) 모두 제어 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ejoint space (관절 공간)\u003c/strong\u003e: 각 관절의 회전 각도나 이동 거리로 로봇 상태를 표현하는 공간. 모터가 실제로 제어하는 공간\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCartesian space (직교 좌표 공간)\u003c/strong\u003e: end-effector의 위치(x,y,z)와 방향(roll,pitch,yaw)으로 상태를 표현하는 공간. 사람이 명령을 내릴 때 쓰는 직관적 공간\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eforward kinematics — FK (순기구학)\u003c/strong\u003e: 관절 각도를 알 때 end-effector의 위치/방향을 계산. 입력 → 관절값, 출력 → 끝단 자세. 항상 유일한 해가 존재\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003einverse kinematics — IK (역기구학)\u003c/strong\u003e: end-effector의 목표 위치/방향을 알 때 필요한 관절 각도를 역으로 계산. 해가 여러 개이거나 없을 수 있어 FK보다 어려움\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eworkspace (작업 공간)\u003c/strong\u003e: 로봇 팔이 도달할 수 있는 3차원 공간의 범위\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003esingularity (특이점)\u003c/strong\u003e: 특정 자세에서 Jacobian 행렬의 행렬식이 0이 되어 역기구학 해가 무한히 많거나 존재하지 않는 상태. 이 자세 근처에서 모터 토크가 급격히 커짐\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJacobian matrix (야코비안 행렬)\u003c/strong\u003e: 관절 속도와 end-effector 속도 사이의 선형 변환 행렬. 역기구학, 특이점 분석, 힘 전달 계산에 핵심\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDH parameters (Denavit-Hartenberg 파라미터)\u003c/strong\u003e: 연속된 관절과 링크의 기하학적 관계를 4개 파라미터(a, d, α, θ)로 표준화해 표현하는 방법\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"동역학-dynamics\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#동역학-dynamics\"\u003e동역학 (Dynamics)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003etorque (토크)\u003c/strong\u003e: 회전축에 작용하는 회전력. 단위 Nm. 다관절 로봇에서 모터가 각 관절에 가하는 힘\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003einertia / moment of inertia (관성 모멘트)\u003c/strong\u003e: 물체가 회전 운동을 유지하려는 저항. 질량이 회전축으로부터 멀수록 커짐. 빠른 움직임을 위해서는 링크 설계 시 관성 최소화 필요\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ecenter of mass — CoM (무게중심)\u003c/strong\u003e: 물체의 질량이 균등하게 분포한다고 볼 수 있는 가상의 점. 중력보상 계산의 기준점\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003egravity torque (중력 토크)\u003c/strong\u003e: 각 관절에서 중력이 만들어내는 회전력. τ = mgl·cos(θ). 자세마다 값이 달라짐\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003egravity compensation (중력보상)\u003c/strong\u003e: 관절에 걸리는 중력 토크를 기계적 장치나 제어 알고리즘으로 상쇄하는 기술\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNewton-Euler equation\u003c/strong\u003e: 힘과 토크의 균형 방정식으로 각 링크에 작용하는 힘과 모멘트를 재귀적으로 계산하는 동역학 공식\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLagrangian dynamics (라그랑지안 동역학)\u003c/strong\u003e: 운동에너지와 위치에너지의 차(라그랑지안)를 이용해 로봇의 운동 방정식을 유도하는 방법. Newton-Euler 대비 수식이 체계적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eequation of motion (운동방정식)\u003c/strong\u003e: \u003ccode\u003eM(q)q̈ + C(q,q̇)q̇ + G(q) = τ\u003c/code\u003e. M=관성행렬, C=코리올리/원심력, G=중력 항, τ=관절 토크\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCoriolis force (코리올리 힘)\u003c/strong\u003e: 회전하는 좌표계에서 운동하는 물체에 작용하는 가상의 힘. 빠르게 움직이는 다관절 로봇에서 무시할 수 없는 동역학 항\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"제어-이론-control\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#제어-이론-control\"\u003e제어 이론 (Control)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePID control\u003c/strong\u003e: 위치 오차(P), 오차 적분(I), 오차 미분(D)을 조합한 고전 제어기. 단순하고 강건하지만 비선형 동역학에는 한계\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePD control\u003c/strong\u003e: PID에서 I 항을 제거한 제어기. 로봇 관절 제어에서 정착 시간을 짧게 유지하면서 안정적으로 사용. 중력보상과 함께 쓰이면 정적 오차도 제거 가능\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003efeedforward control (피드포워드)\u003c/strong\u003e: 센서 피드백 없이 미리 알고 있는 모델(중력, 마찰 등)을 기반으로 제어 입력을 사전에 추가하는 방식. 반응 속도가 빠름\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003efeedback control (피드백)\u003c/strong\u003e: 센서로 현재 상태를 측정해 목표값과의 오차를 줄이는 방향으로 제어 입력을 조정하는 방식. 모델 오차와 외란에 강건\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMIT hybrid control\u003c/strong\u003e: 위치 오차에 대한 PD 제어와 피드포워드 토크를 결합한 구조. \u003ccode\u003eτ = Kp(θ_des−θ) + Kd(θ̇_des−θ̇) + τ_ff\u003c/code\u003e. MIT Mini Cheetah에서 사용\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eimpedance control (임피던스 제어)\u003c/strong\u003e: 로봇 end-effector가 환경과 접촉할 때 힘과 변위의 관계(강성·감쇠·관성)를 제어하는 방식. 유연한 물리적 상호작용에 적합\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eadmittance control (어드미턴스 제어)\u003c/strong\u003e: 외부에서 가해진 힘을 입력받아 원하는 움직임을 생성하는 제어. 임피던스 제어의 쌍대(dual). 힘 센서 대신 모터 전류로 구현하기도 함\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ecompliance control (컴플라이언스 제어)\u003c/strong\u003e: 로봇이 외부 힘에 유연하게 반응하도록 강성(stiffness)을 의도적으로 낮추는 제어 방식. 사람과 협동 로봇에서 안전성 확보에 핵심\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003estiffness (강성) Kp\u003c/strong\u003e: 스프링 상수와 유사. 위치 오차 1rad당 발생시키는 토크(Nm/rad). 높을수록 정확하지만 충격에 취약\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003edamping (감쇠) Kd\u003c/strong\u003e: 속도 오차에 비례해 브레이크처럼 작용하는 계수. 진동 억제와 안정성 확보. MIT 제어기에서 Kd에 해당\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003estate space (상태 공간)\u003c/strong\u003e: 시스템의 현재 상태를 벡터(위치, 속도 등)로 표현하고 상태 전이를 행렬 방정식으로 나타내는 현대 제어 이론의 기반\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLyapunov stability (리아푸노프 안정성)\u003c/strong\u003e: 에너지 함수(Lyapunov function)를 이용해 시스템이 평형점으로 수렴하는지 수학적으로 증명하는 안정성 분석 기법\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"기계-설계-mechanical-design\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#기계-설계-mechanical-design\"\u003e기계 설계 (Mechanical Design)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eactuators (액추에이터)\u003c/strong\u003e: 전기·공압·유압 에너지를 받아 기계적 움직임과 힘으로 변환하는 구동 장치. 로봇의 '근육' 역할\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003egear ratio (감속비)\u003c/strong\u003e: 모터 회전수를 줄이고 토크를 높이는 비율. 100:1이면 모터가 100회전할 때 출력축 1회전, 토크는 100배\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ebackdrivability (백드라이빙)\u003c/strong\u003e: 외부 힘으로 모터를 역방향으로 돌릴 수 있는 특성. 감속비가 낮을수록 좋음. 중력보상·충돌감지·햅틱에 필수\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eQuasi-Direct Drive — QDD (준직접구동)\u003c/strong\u003e: 감속비를 극히 낮게(약 6:1) 설계해 높은 백드라이빙과 힘 투명성을 확보한 구동 방식. MIT Mini Cheetah의 핵심\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eharmonic drive (하모닉 드라이브)\u003c/strong\u003e: 유연한 금속 컵(flexspline)의 탄성 변형을 이용한 감속기. 감속비 50~300:1, 백래시 거의 0, 고정밀. 하지만 백드라이빙 불량\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eplanetary gear (유성기어)\u003c/strong\u003e: 선기어·유성기어·링기어로 구성된 컴팩트한 감속기. 토크 전달 효율 높고 동심축 구조. 산업용 로봇에 광범위하게 사용\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ebacklash (백래시)\u003c/strong\u003e: 기어 이빨 사이의 유격. 방향 전환 시 미세한 위치 오차 발생. 정밀 제어의 적\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eseries elastic actuator — SEA\u003c/strong\u003e: 모터와 출력축 사이에 스프링을 삽입한 액추에이터. 스프링 변형으로 힘을 간접 측정하고 유연성 확보. 착용 로봇·재활 로봇에 적합\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eparallel mechanism (병렬 기구)\u003c/strong\u003e: 고정 베이스와 end-effector를 여러 개의 팔(다리)로 동시에 연결한 구조. 강성 높고 고속·고정밀에 유리. 예: 델타 로봇\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eserial mechanism (직렬 기구)\u003c/strong\u003e: 관절-링크가 순차적으로 연결된 일반적인 로봇 팔 구조. 작업 공간 넓고 구조 단순하지만 강성은 병렬보다 낮음\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"센서-sensors\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#센서-sensors\"\u003e센서 (Sensors)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eencoder (엔코더)\u003c/strong\u003e: 모터 샤프트의 회전각과 속도를 측정하는 센서. 절대형(absolute)과 증분형(incremental)으로 구분. 관절 제어의 핵심 피드백 소스\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIMU — Inertial Measurement Unit (관성 측정 장치)\u003c/strong\u003e: 3축 가속도계 + 3축 자이로스코프 조합. 기울기·각속도·선가속도 측정. 이족보행·드론 자세 추정에 필수\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eforce/torque sensor (힘/토크 센서)\u003c/strong\u003e: end-effector에 가해지는 3축 힘(Fx,Fy,Fz)과 3축 모멘트(Mx,My,Mz)를 측정. 조립·연마·햅틱 피드백에 사용. 고가\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLiDAR\u003c/strong\u003e: 레이저 펄스를 발사하고 반사 시간을 측정해 주변 환경의 3D 포인트 클라우드 생성. 자율주행·이동 로봇의 지도 작성(SLAM)에 핵심\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003edepth camera (뎁스 카메라)\u003c/strong\u003e: 구조광 또는 ToF(Time of Flight) 방식으로 각 픽셀의 거리를 측정해 RGB+Depth 이미지 생성. Intel RealSense, Azure Kinect 등\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eload cell (로드셀)\u003c/strong\u003e: 변형 게이지(strain gauge)를 이용해 압축·인장 방향의 힘을 측정하는 센서. 그리퍼 파지력 측정, 착용 로봇 지면 반력 측정에 사용\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"모빌리티--이동-mobility\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#모빌리티--이동-mobility\"\u003e모빌리티 / 이동 (Mobility)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eodometry (오도메트리)\u003c/strong\u003e: 바퀴 회전량이나 관절 변화량을 누적해 로봇 위치를 추정하는 방법. 누적 오차(drift) 발생\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSLAM — Simultaneous Localization and Mapping\u003c/strong\u003e: 미지의 환경에서 로봇이 자신의 위치를 추정(localization)하면서 동시에 지도를 작성(mapping)하는 기술\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003egait (걸음걸이)\u003c/strong\u003e: 이족·사족 보행 로봇의 발 디딤 순서와 타이밍 패턴. trot(대각선 동시), gallop, walk 등. 속도와 안정성 트레이드오프\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZMP — Zero Moment Point (영모멘트점)\u003c/strong\u003e: 지면 반력의 합력이 작용하는 점. ZMP가 지지 다각형(support polygon) 안에 있을 때 정적 안정. 이족보행 제어의 고전적 기준\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003esupport polygon (지지 다각형)\u003c/strong\u003e: 지면과 접촉하는 발 위치를 꼭짓점으로 하는 다각형. CoM의 투영점이 이 안에 있어야 넘어지지 않음\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"파라미터-식별-parameter-identification\"\u003e\u003ca class=\"heading-link\" aria-hidden=\"true\" href=\"#파라미터-식별-parameter-identification\"\u003e파라미터 식별 (Parameter Identification)\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eparameter identification (파라미터 식별)\u003c/strong\u003e: 로봇의 질량·무게중심·관성 모멘트·마찰 계수 등 동역학 파라미터를 실측 데이터로부터 역산하는 과정\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eregressor matrix (레그레서 행렬)\u003c/strong\u003e: 로봇 동역학 방정식을 \u003ccode\u003eY(q,q̇,q̈)·π = τ\u003c/code\u003e 형태로 변환한 행렬. Y는 측정 가능한 운동학 항, π는 식별할 파라미터 벡터\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eleast squares — LS (최소자승법)\u003c/strong\u003e: 측정값과 모델 예측값 사이의 오차 제곱합을 최소화해 최적 파라미터를 추정하는 방법. \u003ccode\u003eπ = (AᵀA)⁻¹AᵀY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eweighted least squares — WLS (가중 최소자승법)\u003c/strong\u003e: 신뢰도 낮은 측정값에 낮은 가중치를 부여해 아웃라이어 영향을 억제한 최소자승법\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eexcitation trajectory (가진 궤적)\u003c/strong\u003e: 동적 식별에서 모든 동역학 파라미터가 잘 드러나도록 설계된 최적 운동 경로. 정현파 조합으로 구성\u003c/li\u003e\n\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"6:[\"$\",\"section\",null,{\"id\":\"blog\",\"className\":\"mb-30\",\"children\":[[\"$\",\"nav\",null,{\"aria-label\":\"breadcrumb\",\"data-slot\":\"breadcrumb\",\"className\":\"mb-6\",\"children\":[\"$\",\"ol\",null,{\"data-slot\":\"breadcrumb-list\",\"className\":\"text-muted-foreground flex flex-wrap items-center gap-1.5 text-sm break-words sm:gap-2.5\",\"children\":[[\"$\",\"li\",\"item-0\",{\"data-slot\":\"breadcrumb-item\",\"className\":\"inline-flex items-center gap-1.5\",\"children\":\"$L14\"}],[\"$\",\"li\",\"separator-1\",{\"data-slot\":\"breadcrumb-separator\",\"role\":\"presentation\",\"aria-hidden\":\"true\",\"className\":\"[\u0026\u003esvg]:size-3.5\",\"children\":[\"$\",\"svg\",null,{\"ref\":\"$undefined\",\"xmlns\":\"http://www.w3.org/2000/svg\",\"width\":24,\"height\":24,\"viewBox\":\"0 0 24 24\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"strokeWidth\":2,\"strokeLinecap\
